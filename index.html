<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ground Up Agency — D100 Outreach Pages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b1120; color: #e4eaf2;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .wrap { max-width: 480px; width: 100%; text-align: center; }
    .logo { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #0EA5E9; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.9rem; color: #8b9bb5; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Ground Up Agency</div>
    <h1>D100 Outreach Pages</h1>
    <p>Each prospect receives a dedicated page at <code style="color:#0EA5E9">/{prospect-slug}/</code></p>
  </div>
</body>
</html>
